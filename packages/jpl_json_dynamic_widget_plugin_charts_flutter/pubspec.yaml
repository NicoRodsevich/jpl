name: jpl_json_dynamic_widget_plugin_charts_flutter
description: "A plugin to the JSON Dynamic Widget to provide support for Google's Flutter Charts"
version: '3.0.1'
homepage: https://github.com/NicoRodsevich/jpl
repository: https://github.com/NicoRodsevich/jpl/tree/main/packages/jpl_json_dynamic_widget_plugin_charts_flutter
issue_tracker: https://github.com/NicoRodsevich/jpl/issues

environment:
  sdk: ^3.6.0
analyzer:
  exclude:
    - 'lib/generated/**'

dependencies:
  jpl_child_builder: "^2.0.2"
  community_charts_common: '^1.0.0'
  community_charts_flutter: '^1.0.0'
  flutter:
    sdk: 'flutter'
  intl: '^0.18.0'
  jpl_json_class: "^3.0.1"
  jpl_json_dynamic_widget: "^12.0.0"
  json_path: '^0.7.0'
  jpl_json_theme: "^11.0.0"
  logging: '^1.1.0'
  meta: '^1.8.0'
  uuid: '^4.1.0'

false_secrets:
  - 'example/web/index.html'

dev_dependencies:
  flutter_test:
    sdk: 'flutter'

ignore_updates:
  - 'archive'
  - 'async'
  - 'boolean_selector'
  - 'characters'
  - 'charcode'
  - 'collection'
  - 'clock'
  - 'crypto'
  - 'fake_async'
  - 'file'
  - 'matcher'
  - 'material_color_utilities'
  - 'meta'
  - 'path'
  - 'source_span'
  - 'stack_trace'
  - 'stream_channel'
  - 'string_scanner'
  - 'sync_http'
  - 'term_glyph'
  - 'test_api'
  - 'typed_data'
  - 'vector_math'
  - 'webdriver'
