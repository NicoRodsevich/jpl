name: jpl_license_checker2
description: "A tool to view and check the licenses of a package's dependencies. It also generates a disclaimer file containing all the package licenses."
version: '2.3.1+2'
homepage: https://github.com/NicoRodsevich/jpl
repository: https://github.com/NicoRodsevich/jpl/tree/main/packages/jpl_license_checker2
issue_tracker: https://github.com/NicoRodsevich/jpl/issues

environment:
  sdk: ^3.6.0
dependencies:
  args: '^2.7.0'
  barbecue: '^0.5.0'
  colorize: '^3.0.0'
  io: '^1.0.5'
  package_config: '^2.2.0'
  pana: '^0.23.9'
  path: '^1.9.1'
  yaml: '^3.1.3'

dev_dependencies:
  flutter_lints: ^6.0.0
  mockito: '^5.6.3'
  test: '^1.29.0'

executables:
  lic_ck: 'license_checker'

permittedLicenses:
  - 'Apache-2.0'
  - 'BSD-2-Clause'
  - 'BSD-3-Clause'
  - 'MIT'
  - 'MIT-Modern-Variant'
  - 'MPL-2.0'
  - 'Zlib'

packageLicenseOverride:
  fuchsia_remote_debug_protocol: 'BSD-3-Clause'
  integration_test: 'BSD-3-Clause'
  rxdart: 'Apache-2.0'
