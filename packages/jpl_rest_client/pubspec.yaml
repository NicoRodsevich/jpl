name: jpl_rest_client
description: 'A Dart implementation of the a REST client that supports using an Isolate for decoding.'
version: '2.4.0'
homepage: https://github.com/NicoRodsevich/jpl
repository: https://github.com/NicoRodsevich/jpl/tree/main/packages/jpl_rest_client
issue_tracker: https://github.com/NicoRodsevich/jpl/issues

environment:
  sdk: ^3.6.0
dependencies:
  http: '^1.1.0'
  intl: '^0.18.1'
  logging: '^1.2.0'
  meta: '^1.10.0'
  uuid: '^4.2.1'

dev_dependencies:
  flutter_lints: ^6.0.0
  test: '^1.24.9'

ignore_updates:
  - 'archive'
  - 'async'
  - 'boolean_selector'
  - 'characters'
  - 'charcode'
  - 'collection'
  - 'clock'
  - 'crypto'
  - 'fake_async'
  - 'file'
  - 'matcher'
  - 'material_color_utilities'
  - 'meta'
  - 'path'
  - 'source_span'
  - 'stack_trace'
  - 'stream_channel'
  - 'string_scanner'
  - 'sync_http'
  - 'term_glyph'
  - 'test_api'
  - 'typed_data'
  - 'uuid'
  - 'vector_math'
  - 'webdriver'
