name: jpl_json_dynamic_widget_plugin_js
description: "A plugin to the JSON Dynamic Widget to provide JS support to the widgets"
version: "2.3.0+3"
homepage: https://github.com/NicoRodsevich/jpl
repository: https://github.com/NicoRodsevich/jpl/tree/main/packages/jpl_json_dynamic_widget_plugin_js
issue_tracker: https://github.com/NicoRodsevich/jpl/issues

environment:
  sdk: ^3.6.0
analyzer:
  exclude:
    - "lib/generated/**"
    - "lib/**/*.g.dart"

dependencies:
  flutter:
    sdk: "flutter"
  jsf: "^0.6.1"
  jpl_json_dynamic_widget: "^12.0.0"

false_secrets:
  - "example/web/index.html"

dev_dependencies:
  build_runner: ^2.5.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: "flutter"
  jpl_json_dynamic_widget_codegen: "^4.0.1"

permittedLicenses:
  - "Apache-2.0"
  - "BSD-2-Clause"
  - "BSD-3-Clause"
  - "MIT"
  - "MIT-Modern-Variant"
  - "MPL-2.0"
  - "Zlib"

packageLicenseOverride:
  flutter: "BSD-3-Clause"
  flutter_driver: "BSD-3-Clause"
  flutter_goldens: "BSD-3-Clause"
  flutter_localizations: "BSD-3-Clause"
  flutter_web_plugins: "BSD-3-Clause"
  flutter_test: "BSD-3-Clause"
  fuchsia_remote_debug_protocol: "BSD-3-Clause"
  integration_test: "BSD-3-Clause"
  rxdart: "Apache-2.0"
