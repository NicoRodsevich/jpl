name: jpl_automated_testing_framework_server_websocket
description: 'Websocket based server for the Automated Testing Framework driver.'
version: '2.0.1+14'
homepage: https://github.com/NicoRodsevich/jpl
repository: https://github.com/NicoRodsevich/jpl/tree/main/packages/jpl_automated_testing_framework_server_websocket
issue_tracker: https://github.com/NicoRodsevich/jpl/issues

environment: 
  sdk: ^3.6.0
dependencies: 
  args: '^2.4.1'
  jpl_automated_testing_framework_models: "^2.0.10"
  jpl_json_class: "^3.0.1"
  logging: '^1.1.1'
  meta: '^1.8.0'
  uuid: '^4.5.1'
  web_socket_channel: '^2.4.0'

dev_dependencies: 
  test: '^1.24.2'

ignore_updates: 
  - 'archive'
  - 'async'
  - 'boolean_selector'
  - 'characters'
  - 'charcode'
  - 'collection'
  - 'clock'
  - 'crypto'
  - 'fake_async'
  - 'file'
  - 'matcher'
  - 'material_color_utilities'
  - 'meta'
  - 'path'
  - 'source_span'
  - 'stack_trace'
  - 'stream_channel'
  - 'string_scanner'
  - 'sync_http'
  - 'term_glyph'
  - 'test_api'
  - 'typed_data'
  - 'vector_math'
  - 'webdriver'
