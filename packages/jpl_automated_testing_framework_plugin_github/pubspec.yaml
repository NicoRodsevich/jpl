name: jpl_automated_testing_framework_plugin_github
description: 'Library to use provide github support for test hosting for the Automated Testing Framework.'
version: '2.0.1+14'
homepage: https://github.com/NicoRodsevich/jpl
repository: https://github.com/NicoRodsevich/jpl/tree/main/packages/jpl_automated_testing_framework_plugin_github
issue_tracker: https://github.com/NicoRodsevich/jpl/issues

environment: 
  sdk: ^3.6.0
dependencies: 
  jpl_automated_testing_framework_models: "^2.0.10"
  convert: '^3.1.1'
  flutter: 
    sdk: 'flutter'
  jpl_form_validation: "^3.2.0"
  github: '^9.12.0'
  jpl_json_class: "^3.0.1"
  logging: '^1.1.1'
  pointycastle: '^3.7.3'
  jpl_static_translations: "^2.1.2"

dev_dependencies: 
  flutter_test: 
    sdk: 'flutter'


flutter: 
  uses-material-design: true

ignore_updates: 
  - 'archive'
  - 'async'
  - 'boolean_selector'
  - 'characters'
  - 'charcode'
  - 'collection'
  - 'clock'
  - 'crypto'
  - 'fake_async'
  - 'file'
  - 'matcher'
  - 'material_color_utilities'
  - 'meta'
  - 'path'
  - 'source_span'
  - 'stack_trace'
  - 'stream_channel'
  - 'string_scanner'
  - 'sync_http'
  - 'term_glyph'
  - 'test_api'
  - 'typed_data'
  - 'vector_math'
  - 'webdriver'
